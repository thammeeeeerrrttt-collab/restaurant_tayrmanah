    <div style="margin-bottom: 15px;">
        <label>Naam (الاسم):</label>
        <input type="text" id="res-name" placeholder="Uw naam" style="width:100%; padding:10px; margin-top:5px; border-radius:5px; border:1px solid #ccc;">
    </div>

    <div style="margin-bottom: 15px; display: flex; gap: 10px;">
        <div style="flex: 1;">
            <label>Datum (التاريخ):</label>
            <input type="date" id="res-date" style="width:100%; padding:10px; margin-top:5px; border-radius:5px; border:1px solid #ccc;">
        </div>
        <div style="flex: 1;">
            <label>Tijd (الوقت):</label>
            <input type="time" id="res-time" style="width:100%; padding:10px; margin-top:5px; border-radius:5px; border:1px solid #ccc;">
        </div>
    </div>

    <div style="margin-bottom: 15px; display: flex; gap: 10px;">
        <div style="flex: 1;">
            <label>Personen (العدد):</label>
            <input type="number" id="res-guests" value="2" min="1" style="width:100%; padding:10px; margin-top:5px; border-radius:5px; border:1px solid #ccc;">
        </div>
        <div style="flex: 1;">
            <label>Zitplaats (الجلسة):</label>
            <select id="res-seating" style="width:100%; padding:10px; margin-top:5px; border-radius:5px; border:1px solid #ccc;">
                <option value="Tafel">Tafel (طاولة)</option>
                <option value="Zitting">Zitting (جلسة عربية)</option>
            </select>
        </div>
    </div>

    <div style="margin-bottom: 15px;">
        <label>Bericht (ملاحظات):</label>
        <textarea id="res-message" placeholder="Extra wensen..." style="width:100%; padding:10px; margin-top:5px; border-radius:5px; border:1px solid #ccc; height: 80px;"></textarea>
    </div>

    <button onclick="sendReservationToWhatsApp()" style="width:100%; padding:15px; background:#28a745; color:white; border:none; border-radius:5px; cursor:pointer; font-weight:bold; font-size:1.1rem;">
        Reserveer via WhatsApp 💬
    </button>
